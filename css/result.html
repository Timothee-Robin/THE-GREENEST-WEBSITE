<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Footprint Results</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/style-result.css">
</head>

<body>
    <header class="header">
        <div class="header__logo-title">
            <a href="index.html">
                <img src="../img/foot.png" alt="Bigfoot Logo" class="header__logo">
            </a>
            <a href="index.html"> <span class="header__bigfoot">BIGFOOT</span></a>
            <span class="header__slogan">The New Footprint Calculator</span>
        </div>
        <nav class="header__nav">
            <ul class="header__nav-list">
                <li>
                    <a href="index.html">
                        <img src="../img/home-icon.png" alt="Home" class="nav-icon home-icon">
                        <span class="nav-text">Home</span>
                    </a>
                </li>
                <li>
                    <a href="bilan.html">
                        <img src="../img/calculate-icon.png" alt="Calculate" class="nav-icon calculate-icon">
                        <span class="nav-text">Calculate</span>
                    </a>
                </li>
                <li>
                    <a href="about.html">
                        <img src="../img/about-icon.png" alt="About" class="nav-icon about-icon">
                        <span class="nav-text">About</span>
                    </a>
                </li>
                <li>
                    <a href="result.html#auth-panel" id="auth-nav-link" aria-label="Login">Login</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="graph">
      
        </div>
        <section id="analysis-section">
            <h2 id="analysis-title">Your Carbon Footprint Analysis</h2>
            <div id="analysis-text">
               
            </div>
        </section>

        <section id="auth-panel" class="account-panel">
            <h2>Account</h2>
            <div id="auth-message" class="auth-message"></div>

            <div id="auth-guest">
                <p>Log in to save your assessments to the database and view your history.</p>
                <div class="auth-fields">
                    <input type="email" id="auth-email" placeholder="Email" autocomplete="email">
                    <input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
                </div>
                <div class="auth-actions">
                    <button type="button" id="btn-sign-in">Log In</button>
                    <button type="button" id="btn-sign-up">Sign Up</button>
                </div>
            </div>

            <div id="auth-user" style="display:none;">
                <p>Logged in as <strong id="auth-user-email"></strong></p>
                <button type="button" id="btn-sign-out">Log Out</button>
            </div>
        </section>

        <section id="history-panel" class="history-panel">
            <h2>Assessment History</h2>
            <p id="history-message" class="history-message"></p>
            <ul id="history-list" class="history-list">
                <li>Log in to view your online history.</li>
            </ul>
        </section>
    </main>
    <footer class="footer">
        <a href="about.html" class="footer__link">About us</a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabaseClient.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/bilans.js"></script>
    <script src="../js/result.js"></script>
</body>

</html>
